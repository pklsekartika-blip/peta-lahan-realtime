<!DOCTYPE html>
<html>
<head>
    <title>Peta Lahan Realtime</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style> #map { height: 600px; } </style>
</head>
<body>
    <div id="map"></div>

    <script>
        var map = L.map('map', {
            maxZoom: 22
        }).setView([-7.129090907160889, 112.72478179813258], 15); // Sesuaikan lokasi Anda
        var googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            maxZoom: 22,
            maxNativeZoom: 20,
            subdomains:['mt0','mt1','mt2','mt3'],
            attribution: '&copy; Google Maps'
        }).addTo(map);

        // Baris untuk legenda 
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend');
            div.style.backgroundColor = 'white';
            div.style.padding = '10px';
            div.style.borderRadius = '5px';
            div.style.lineHeight = '20px';
            div.innerHTML += '<b>Keterangan:</b><br>';
            div.innerHTML += '<i style="background: #ff4d4d; width: 15px; height: 15px; display: inline-block; vertical-align: middle;"></i> Terpakai<br>';
            div.innerHTML += '<i style="background: #2ecc71; width: 15px; height: 15px; display: inline-block; vertical-align: middle;"></i> Kosong';
            return div;
        };
        legend.addTo(map);
        // --- BARIS UNTUK LEGENDA SELESAI ---
        
        async function loadPeta() {
            // 1. Ambil Data Atribut dari Google Apps Script (Real-time)
            const responseAttr = await fetch('https://script.google.com/macros/s/AKfycbyKUdeTCmStty-HhoqpsuX1ria7b4bMyxTtRfaDsnL4hb01GX_HoDL3prlu0K_iNvZ0lQ/exec');
            const dataAtribut = await responseAttr.json();

            // 2. Ambil Data Geometri (GeoJSON dari SHP Anda)
            const responseGeo = await fetch('Lahan_Agro.geojson'); 
            const dataGeo = await responseGeo.json();

            const waktuSekarang = new Date();
            // 3. Gabungkan Data berdasarkan kolom 'Nama_Lahan'
            L.geoJSON(dataGeo, {
                style: function(feature) {
                    // Cari data di Google Sheet yang Nama_Lahan-nya cocok
                    const match = dataAtribut.find(item => item.Nama_Lahan === feature.properties.Nama_Lahan);
                    let statusAktif = false;

                    if (match && match.Selesai) {
                        // fungsi parsing tanggal DD/MM/YYYY
                        // Memecah "22/04/2026" menjadi [22, 04, 2026]
                        const parts = match.Selesai.split('/');
                        const waktuSelesai = new Date(parts[2], parts[1] - 1, parts[0]);

                        if (waktuSekarang < waktuSelesai) {
                            statusAktif = true;
                        }
                    }

                    return {
                        fillColor: statusAktif ? "#ff4d4d" : "#2ecc71",
                        weight: 2,
                        opacity: 1,
                        color: 'white',
                        fillOpacity: 0.7
                    };
                },
                onEachFeature: function (feature, layer) {
                    const match = dataAtribut.find(item => item.Nama_Lahan === feature.properties.Nama_Lahan);
            
                    let isExpired = true;
                    if (match && match.Selesai) {
                        const parts = match.Selesai.split('/');
                        const waktuSelesai = new Date(parts[2], parts[1] - 1, parts[0]);
                        isExpired = waktuSekarang > waktuSelesai;
                    }        
                
                    
                    let popupContent = `<b>Lahan: ${feature.properties.Nama_Lahan}</b><br>`;
                    if (match && !isExpired) {
                        popupContent += `
                            <hr>
                            <b>Status: TERPAKAI</b><br>
                            Judul: ${match.Judul}<br>
                            Dosen: ${match.Dosen}<br>
                            Selesai pada: ${match.Selesai}`;
                    } else {
                        popupContent += `<br><b>Status: KOSONG</b><br>
                                         <small>${match ? "(Peminjaman sebelumnya telah berakhir)" : "Belum ada peminjaman aktif"}</small>`;
                    }
                    layer.bindPopup(popupContent);
                },
            }).addTo(map);
        }

        loadPeta();
    </script>
</body>
</html>
